document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

order-radius:999px;\">Pitch 15 min + 5 Q&amp;A<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"max-width:880px;margin:0 auto;padding:0 28px 96px;\">\n\n    <!-- 1. El ejercicio -->\n    <section style=\"padding:42px 0;border-bottom:1px solid #EFEDE8;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D4A017;font-weight:600;margin-bottom:8px;\">El ejercicio<\u002Fdiv>\n      <h2 style=\"font-size:23px;font-weight:700;color:#1E1040;letter-spacing:-0.01em;margin:0 0 8px;\">Qué es la Amazing Race Q3<\u002Fh2>\n      <p style=\"font-size:15px;color:#3D3D3D;line-height:1.65;margin:0 0 22px;max-width:68ch;\">Un sprint de diseño de producto de Sergio. Diez días para diseñar un producto que acerque a Mango a ser el buró de la construcción, y presentarlo en Demo Day ante el comité (CEO, CTO, CFO).<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:26px;\">\n        <div style=\"border:1px solid #E5E2DA;border-radius:14px;padding:16px 18px;\"><div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#A9A28D;font-weight:600;\">Duración<\u002Fdiv><div style=\"font-weight:700;font-size:19px;color:#1E1040;margin-top:5px;\">~10 días<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid #E5E2DA;border-radius:14px;padding:16px 18px;\"><div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#A9A28D;font-weight:600;\">Kickoff<\u002Fdiv><div style=\"font-weight:700;font-size:19px;color:#1E1040;margin-top:5px;\">24 jun<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid #E5E2DA;border-radius:14px;padding:16px 18px;\"><div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#A9A28D;font-weight:600;\">Demo Day<\u002Fdiv><div style=\"font-weight:700;font-size:19px;color:#1E1040;margin-top:5px;\">30 jun<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid #E5E2DA;border-radius:14px;padding:16px 18px;\"><div style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#A9A28D;font-weight:600;\">Pitch<\u002Fdiv><div style=\"font-weight:700;font-size:19px;color:#1E1040;margin-top:5px;\">15 + 5 min<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#A9A28D;font-weight:600;margin-bottom:14px;\">Qué tiene que traer cada propuesta<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:0;\">\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#D4A017;margin-top:7px;\"><\u002Fspan><span style=\"font-size:14px;line-height:1.55;\"><b style=\"color:#1E1040;font-weight:600;\">Discovery real.<\u002Fb> <span style=\"color:#6E687C;\">Hablar con usuarios de verdad, con nombre, empresa y cita textual. Este trabajo no se delega a la IA.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#D4A017;margin-top:7px;\"><\u002Fspan><span style=\"font-size:14px;line-height:1.55;\"><b style=\"color:#1E1040;font-weight:600;\">Una señal de dato nueva.<\u002Fb> <span style=\"color:#6E687C;\">Algo que Mango no captura hoy y que ningún buró ve.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#D4A017;margin-top:7px;\"><\u002Fspan><span style=\"font-size:14px;line-height:1.55;\"><b style=\"color:#1E1040;font-weight:600;\">Un modelo de negocio.<\u002Fb> <span style=\"color:#6E687C;\">Cómo cobra, cuánto cuesta, ruta al primer peso.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#D4A017;margin-top:7px;\"><\u002Fspan><span style=\"font-size:14px;line-height:1.55;\"><b style=\"color:#1E1040;font-weight:600;\">Algo tangible.<\u002Fb> <span style=\"color:#6E687C;\">Un prototipo o MVP que se pueda tocar, no slides.<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FEF9E7;border-radius:14px;padding:18px 22px;margin-top:20px;font-size:13.5px;color:#6a5500;line-height:1.65;\"><b style=\"color:#1E1040;\">Las reglas que el comité revisa:<\u002Fb> la IA acelera la investigación y la estructura; el trabajo de campo lo hacen ustedes. Los datos tienen que ser triangulables, confirmados por una contraparte con interés contrario y no solo por lo que dijo el usuario. Y cada propuesta define sus kill criteria: bajo qué condición se mata la idea.<\u002Fdiv>\n      <p style=\"font-size:14px;color:#3D3D3D;line-height:1.7;margin-top:18px;\">Gana el producto que mejor responde las 7 preguntas del comité (están más abajo). Y esto no termina en el pitch: si la propuesta es sólida, Mango la construye de verdad, con recursos reales.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- 2. Por qué estamos aquí -->\n    <section style=\"padding:42px 0;border-bottom:1px solid #EFEDE8;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D4A017;font-weight:600;margin-bottom:8px;\">Por qué estamos aquí<\u002Fdiv>\n      <h1 style=\"font-size:34px;font-weight:800;color:#1E1040;letter-spacing:-0.025em;line-height:1.1;margin:0 0 14px;\">El reto, en una frase<\u002Fh1>\n      <p style=\"font-size:15.5px;color:#3D3D3D;line-height:1.75;margin:0;\">Mango opera la infraestructura financiera entre constructores y distribuidores. Cada pago, cada factura, cada día de mora es una señal que ningún buró captura. Para llegar a ser el buró de crédito de la construcción necesitamos productos que generen más señales — pero el riesgo de una startup en nuestra etapa no es quedarnos cortos de productos, es dispersarnos. Por eso este brief no propone abrir un frente nuevo: propone <b style=\"color:#1E1040;\">cerrar un círculo que ya abrimos<\u002Fb>.<\u002Fp>\n      <div style=\"background:#FEF9E7;border-radius:14px;padding:20px 22px;margin-top:20px;\">\n        <div style=\"font-weight:600;color:#1E1040;font-size:15px;\">La pregunta que el producto debe responder<\u002Fdiv>\n        <div style=\"font-size:14px;color:#6a5500;margin-top:6px;line-height:1.65;\">¿Qué señal operativa podemos crear que el usuario quiera usar — y que además de generar datos crediticios valiosos, genere dinero para Mango?<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 3. La munición -->\n    <section style=\"padding:42px 0;border-bottom:1px solid #EFEDE8;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D4A017;font-weight:600;margin-bottom:8px;\">Evidencia &gt; opinión<\u002Fdiv>\n      <h2 style=\"font-size:23px;font-weight:700;color:#1E1040;letter-spacing:-0.01em;margin:0 0 8px;\">La munición: los números reales de Mango<\u002Fh2>\n      <p style=\"font-size:15px;color:#3D3D3D;line-height:1.65;margin:0 0 22px;max-width:68ch;\">Estos datos salieron de la planning, directo del datalake. Son la base para anclar cualquier propuesta en evidencia y el piso de credibilidad ante el comité. Úsenlos.<\u002Fp>\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:28px;\">\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:18px;\"><div style=\"font-weight:800;font-size:26px;color:#D4A017;letter-spacing:-0.02em;\">$297M<\u002Fdiv><div style=\"font-size:12px;color:#A9A28D;margin-top:4px;font-weight:500;\">GMV acumulado<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:18px;\"><div style=\"font-weight:800;font-size:26px;color:#D4A017;letter-spacing:-0.02em;\">$5.9M<\u002Fdiv><div style=\"font-size:12px;color:#A9A28D;margin-top:4px;font-weight:500;\">Revenue acumulado<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:18px;\"><div style=\"font-weight:800;font-size:26px;color:#1E1040;letter-spacing:-0.02em;\">11,289<\u002Fdiv><div style=\"font-size:12px;color:#A9A28D;margin-top:4px;font-weight:500;\">Operaciones<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:18px;\"><div style=\"font-weight:800;font-size:26px;color:#1E1040;letter-spacing:-0.02em;\">196<\u002Fdiv><div style=\"font-size:12px;color:#A9A28D;margin-top:4px;font-weight:500;\">Constructores<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:18px;\"><div style=\"font-weight:800;font-size:26px;color:#1E1040;letter-spacing:-0.02em;\">35<\u002Fdiv><div style=\"font-size:12px;color:#A9A28D;margin-top:4px;font-weight:500;\">Distribuidores activos<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:18px;\"><div style=\"font-weight:800;font-size:26px;color:#1E1040;letter-spacing:-0.02em;\">39<\u002Fdiv><div style=\"font-size:12px;color:#A9A28D;margin-top:4px;font-weight:500;\">Meses operando<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#A9A28D;font-weight:600;margin-bottom:10px;\">Crecimiento anual<\u002Fdiv>\n      <div style=\"margin-bottom:26px;\">\n        <div style=\"display:flex;gap:14px;align-items:baseline;padding:10px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;min-width:74px;font-weight:700;font-size:13.5px;color:#1E1040;\">2023<\u002Fspan><span style=\"flex:none;min-width:130px;font-size:13.5px;color:#3D3D3D;\">GMV $2.25M<\u002Fspan><span style=\"font-size:13.5px;color:#6E687C;\">rev $0.036M<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:baseline;padding:10px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;min-width:74px;font-weight:700;font-size:13.5px;color:#1E1040;\">2024<\u002Fspan><span style=\"flex:none;min-width:130px;font-size:13.5px;color:#3D3D3D;\">GMV $42M<\u002Fspan><span style=\"flex:none;min-width:110px;font-size:13.5px;color:#6E687C;\">rev $0.26M<\u002Fspan><span style=\"font-size:13px;color:#D4A017;font-weight:700;\">19x YoY<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:baseline;padding:10px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;min-width:74px;font-weight:700;font-size:13.5px;color:#1E1040;\">2025<\u002Fspan><span style=\"flex:none;min-width:130px;font-size:13.5px;color:#3D3D3D;\">GMV $169M<\u002Fspan><span style=\"font-size:13.5px;color:#6E687C;\">rev $3.3M<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:baseline;padding:10px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;min-width:74px;font-weight:700;font-size:13.5px;color:#1E1040;\">2026 YTD<\u002Fspan><span style=\"flex:none;min-width:130px;font-size:13.5px;color:#3D3D3D;\">GMV $85M<\u002Fspan><span style=\"font-size:13.5px;color:#6E687C;\">rev $2.28M<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#A9A28D;font-weight:600;margin-bottom:14px;\">Mix de producto · 2026 YTD<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;margin-bottom:26px;\">\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#D4A017;margin-top:7px;\"><\u002Fspan><span style=\"font-size:14px;line-height:1.55;\"><b style=\"color:#1E1040;font-weight:600;\">Garantía / Credit Protection — 80% del GMV.<\u002Fb> <span style=\"color:#6E687C;\">$67.6M en GMV, 2,886 operaciones, $860K de revenue.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#D4A017;margin-top:7px;\"><\u002Fspan><span style=\"font-size:14px;line-height:1.55;\"><b style=\"color:#1E1040;font-weight:600;\">Factoring — 20% del GMV.<\u002Fb> <span style=\"color:#6E687C;\">$17M en GMV, 323 operaciones, $254K de revenue.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#D4A017;margin-top:7px;\"><\u002Fspan><span style=\"font-size:14px;line-height:1.55;\"><b style=\"color:#1E1040;font-weight:600;\">Fee promedio: 1.52%.<\u002Fb><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#A9A28D;font-weight:600;margin-bottom:10px;\">Salud del portafolio<\u002Fdiv>\n      <div style=\"margin-bottom:16px;\">\n        <div style=\"display:flex;gap:14px;align-items:baseline;padding:10px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;min-width:240px;font-size:13.5px;color:#1E1040;font-weight:500;\">10,216 operaciones pagadas<\u002Fspan><span style=\"font-size:13.5px;color:#6E687C;\">$266M liquidados (histórico)<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:baseline;padding:10px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;min-width:240px;font-size:13.5px;color:#1E1040;font-weight:500;\">614 pendientes vigentes<\u002Fspan><span style=\"font-size:13.5px;color:#6E687C;\">$17.5M cartera activa<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:baseline;padding:10px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;min-width:240px;font-size:13.5px;color:#1E1040;font-weight:500;\">459 vencidas<\u002Fspan><span style=\"font-size:13.5px;color:#C0392B;font-weight:700;\">$13.6M<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:baseline;padding:10px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;min-width:240px;font-size:13.5px;color:#1E1040;font-weight:500;\">Mora 4.1% sobre cartera total<\u002Fspan><span style=\"font-size:13.5px;color:#6E687C;\">tasa de pago histórica 95.7%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FEF9E7;border-radius:14px;padding:16px 20px;margin-bottom:26px;font-size:13px;color:#6a5500;line-height:1.65;\"><b style=\"color:#1E1040;\">Nota de transparencia:<\u002Fb> una lámina anterior reporta 87% de pago a tiempo y 1.9% de default sobre TPV lifetime. Son métricas con definiciones distintas a la mora 4.1% / pago 95.7%, todavía sin reconciliar. Si las usan en el pitch, aclaren la definición.<\u002Fdiv>\n\n      <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#A9A28D;font-weight:600;margin-bottom:8px;\">Concentración de proveedores · 2026<\u002Fdiv>\n      <div style=\"font-size:13.5px;color:#3D3D3D;margin-bottom:10px;\">Top 7 distribuidores = <b style=\"color:#1E1040;\">73% del GMV 2026<\u002Fb>.<\u002Fdiv>\n      <div style=\"margin-bottom:26px;\">\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #EFEDE8;font-size:13.5px;\"><span style=\"color:#1E1040;\">Plafones y Acabados<\u002Fspan><span style=\"color:#6E687C;font-weight:600;\">$19.2M<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #EFEDE8;font-size:13.5px;\"><span style=\"color:#1E1040;\">Gama Materiales<\u002Fspan><span style=\"color:#6E687C;font-weight:600;\">$14.2M<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #EFEDE8;font-size:13.5px;\"><span style=\"color:#1E1040;\">MCAO Occidente<\u002Fspan><span style=\"color:#6E687C;font-weight:600;\">$9.1M<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #EFEDE8;font-size:13.5px;\"><span style=\"color:#1E1040;\">Aceros y Triturados MTY<\u002Fspan><span style=\"color:#6E687C;font-weight:600;\">$6.5M<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #EFEDE8;font-size:13.5px;\"><span style=\"color:#1E1040;\">Harmak<\u002Fspan><span style=\"color:#6E687C;font-weight:600;\">$4.1M<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #EFEDE8;font-size:13.5px;\"><span style=\"color:#1E1040;\">Tumatsa<\u002Fspan><span style=\"color:#6E687C;font-weight:600;\">$4.0M<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #EFEDE8;font-size:13.5px;\"><span style=\"color:#1E1040;\">Surtidor Eléctrico<\u002Fspan><span style=\"color:#6E687C;font-weight:600;\">$3.5M<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#A9A28D;font-weight:600;margin-bottom:14px;\">El moat — 3 capas de señal que solo Mango cruza<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:18px;\">\n        <div style=\"background:#F4F4F4;border-radius:14px;padding:18px;\"><div style=\"font-weight:600;color:#1E1040;font-size:14px;margin-bottom:5px;\">Transaccional<\u002Fdiv><div style=\"font-size:13px;color:#6E687C;line-height:1.55;\">Qué compra, frecuencia, mix de proveedores.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#F4F4F4;border-radius:14px;padding:18px;\"><div style=\"font-weight:600;color:#1E1040;font-size:14px;margin-bottom:5px;\">Comportamiento<\u002Fdiv><div style=\"font-size:13px;color:#6E687C;line-height:1.55;\">Días reales de pago vs pactado, mora, abonos post-vencimiento.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#F4F4F4;border-radius:14px;padding:18px;\"><div style=\"font-weight:600;color:#1E1040;font-size:14px;margin-bottom:5px;\">Intención<\u002Fdiv><div style=\"font-size:13px;color:#6E687C;line-height:1.55;\">Paga penalizaciones, red de quién paga por quién.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:14px;color:#3D3D3D;line-height:1.7;margin:0 0 26px;\">Mango es el único que ve las tres cruzadas: por eso distingue <b style=\"color:#1E1040;\">\"no quiso pagar\"<\u002Fb> de <b style=\"color:#1E1040;\">\"no pudo porque no le pagaron\"<\u002Fb>. 89K data points propietarios, 14.8K transferencias procesadas, 646 expedientes Alma, 39 meses operando.<\u002Fp>\n\n      <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#A9A28D;font-weight:600;margin-bottom:14px;\">El mercado<\u002Fdiv>\n      <div style=\"background:#1E1040;color:#fff;border-radius:18px;padding:26px 28px;\">\n        <div style=\"font-size:28px;font-weight:800;letter-spacing:-0.02em;color:#D4A017;\">$1.2T MXN / año<\u002Fdiv>\n        <div style=\"font-size:14px;color:#C9C4D6;margin-top:8px;line-height:1.65;\">La cadena de valor de la construcción mueve esto al año sin infraestructura de crédito. Cinco actores —productor, distribuidor, constructor, albañil, cliente final— y nadie ve la película completa. Mango se sienta en el cruce.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 4. Un ejemplo -->\n    <section style=\"padding:42px 0;border-bottom:1px solid #EFEDE8;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D4A017;font-weight:600;margin-bottom:8px;\">MI PROPUESTA COMO EJEMPLO<\u002Fdiv>\n      <h2 style=\"font-size:23px;font-weight:700;color:#1E1040;letter-spacing:-0.01em;margin:0 0 8px;\">Proyectos Extendido<\u002Fh2>\n      <p style=\"font-size:15px;color:#3D3D3D;line-height:1.65;margin:0 0 20px;max-width:68ch;\">Esto es un ejemplo para aterrizar qué buscamos, no la propuesta a ejecutar. Sirve para mostrar el nivel de pensamiento y cómo se conecta con la tesis. Pueden tomarla, ajustarla, descartarla, o ignorarla y traer la suya.<\u002Fp>\n      <div style=\"font-size:15px;color:#3D3D3D;line-height:1.78;\">\n        <p style=\"margin:0 0 16px;\">No es un producto nuevo. Es una extensión que le da súper poderes a nuestro north star. No necesitamos un abanico excesivo de productos — necesitamos cerrar los círculos que conectan el ecosistema de la construcción en México. Y el círculo más valioso a medio cerrar es <b style=\"color:#1E1040;\">Proyectos<\u002Fb>.<\u002Fp>\n        <p style=\"margin:0 0 16px;\">Hoy Proyectos administra la obra en curso con el dato fiscal del constructor vía Syntage. Vemos el reflejo financiero de la obra, pero no la obra en sí — y no entramos antes de que el proyecto arranque, que es justo donde se decide todo.<\u002Fp>\n        <p style=\"margin:0 0 16px;\"><b style=\"color:#1E1040;\">El flujo que propongo:<\u002Fb> el constructor escanea el plano de su obra; nosotros lo convertimos en cuantificación de materiales (takeoff) y, cruzándola contra catálogos de precio de distribuidores, le devolvemos un costo aproximado de obra — un benchmark, sin nombres. Es un forecast calculado desde el plano contra precios reales del ecosistema. Con ese número, el constructor decide si aplica a financiamiento de obra completa, solo de materiales, o ninguno. Si no toma nada, ya nos consumió el producto y nos dejó el dato del proyecto tentativo: <b style=\"color:#1E1040;\">temperatura del mercado y proyecciones en tiempo real<\u002Fb>.<\u002Fp>\n        <p style=\"margin:0 0 16px;\">En el mundo ideal con ERPs de distribuidores conectados, le sugerimos los distribuidores más aptos para surtir esa obra específica. Mango queda en el medio consumiendo todo: la cuantificación, el costo, la decisión de financiamiento, qué distribuidor surte, y cómo evoluciona la obra real contra el estimado.<\u002Fp>\n        <p style=\"margin:0 0 16px;\"><b style=\"color:#1E1040;\">El \"cómo\" es lo que hay que validar.<\u002Fb> El corazón es convertir un plano en cuantificación de materiales — lo que hacen herramientas como Togal.ai (puede que no sea un solo partner; lo evaluamos). Propongo una secuencia intencional: <b style=\"color:#1E1040;\">fase de testeo<\u002Fb>, lo tercerizo con un partner que ya cuantifica planos, valido la hipótesis y busco PMF rápido y barato sin construir IP cara para algo no probado; <b style=\"color:#1E1040;\">fase de escala<\u002Fb>, si hay PMF lo construyo in-house y lo vuelvo IP de Mango.<\u002Fp>\n        <p style=\"margin:0 0 16px;\"><b style=\"color:#1E1040;\">Qué desbloquea:<\u002Fb> Mango deja de entrar cuando la obra ya va en curso y entra desde antes de que se construya — en el momento de la decisión de compra y financiamiento. Alma pasa de reportar lo que pasó a originar y predecir: qué obras se están cocinando antes de existir, qué constructor trae pipeline real, y hacia dónde se mueve la demanda de material antes que nadie.<\u002Fp>\n        <p style=\"margin:0;\">Somos los únicos que ya tenemos las dos puntas, los catálogos de precio y la posibilidad de conectar los ERPs. Nadie más puede pararse en el medio de esa transacción. La jugada ganadora es profundizar el ecosistema que ya conectamos, monetizando en cada nodo: financiamiento de obra o materiales, conversión de crédito, matchmaking con el distribuidor, y consumiendo el dato más valioso que existe — el pipeline de obra del país antes de que se construya.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 5. La regla del juego -->\n    <section style=\"padding:42px 0;border-bottom:1px solid #EFEDE8;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D4A017;font-weight:600;margin-bottom:8px;\">La regla del juego<\u002Fdiv>\n      <h2 style=\"font-size:23px;font-weight:700;color:#1E1040;letter-spacing:-0.01em;margin:0 0 8px;\">Qué traes mañana<\u002Fh2>\n      <p style=\"font-size:15px;color:#3D3D3D;line-height:1.65;margin:0 0 18px;max-width:68ch;\">Antes del call, cada quien manda lo suyo. Tres caminos válidos, todos en igualdad de condiciones — el ejemplo de arriba no tiene ventaja por ser mío.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;\">\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:20px;\"><div style=\"display:inline-flex;align-items:center;padding:5px 14px;background:#D4A017;color:#fff;font-weight:600;font-size:12px;border-radius:999px;margin-bottom:12px;\">Complementa<\u002Fdiv><div style=\"font-size:13.5px;color:#6a5500;line-height:1.6;\">Si el ejemplo te hace sentido, súmale: una pieza que falta, una mejor forma de cobrar, un ángulo de la señal que no vi.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:20px;\"><div style=\"display:inline-flex;align-items:center;padding:5px 14px;background:#D4A017;color:#fff;font-weight:600;font-size:12px;border-radius:999px;margin-bottom:12px;\">Modifica<\u002Fdiv><div style=\"font-size:13.5px;color:#6a5500;line-height:1.6;\">Toma la base y cámbiala: otro flujo, otra fase 1, otro punto de entrada al ecosistema. Lo que la haga más fuerte.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:20px;\"><div style=\"display:inline-flex;align-items:center;padding:5px 14px;background:#D4A017;color:#fff;font-weight:600;font-size:12px;border-radius:999px;margin-bottom:12px;\">Propón nueva<\u002Fdiv><div style=\"font-size:13.5px;color:#6a5500;line-height:1.6;\">Si tienes una idea distinta que cierra mejor un círculo del ecosistema, tráela. No tiene que partir del ejemplo.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1.5px solid #1E1040;border-radius:14px;padding:18px 22px;margin-top:16px;font-size:13.5px;color:#3D3D3D;line-height:1.65;\"><b style=\"color:#1E1040;\">La condición del producto:<\u002Fb> tiene que aportar algo que el catálogo actual no da. Puede ser una mejora o un complemento de algo que ya existe —como Proyectos Extendido, que toma Proyectos y lo extiende— o una idea completamente nueva. Lo que no cuenta es volver a proponer Credit Protection, Cobros, Fianzas o Raya tal como ya operan.<\u002Fdiv>\n      <div style=\"background:#FEF9E7;border-radius:14px;padding:18px 22px;margin-top:12px;font-size:13.5px;color:#6a5500;line-height:1.65;\">Una sola regla de fondo: <b style=\"color:#1E1040;\">evidencia &gt; opinión<\u002Fb>. Vengas con lo que vengas, ánclalo en datos reales o en lo que escuchaste de un usuario. El comité pregunta detalles; si el trabajo no es real, se nota.<\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 6. El primer entregable -->\n    <section style=\"padding:42px 0;border-bottom:1px solid #EFEDE8;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D4A017;font-weight:600;margin-bottom:8px;\">El primer entregable<\u002Fdiv>\n      <h2 style=\"font-size:23px;font-weight:700;color:#1E1040;letter-spacing:-0.01em;margin:0 0 8px;\">Lo que vas a tener que llenar<\u002Fh2>\n      <p style=\"font-size:15px;color:#3D3D3D;line-height:1.65;margin:0 0 18px;max-width:68ch;\">Después de la llamada de mañana, lo primero que el equipo llena en la plataforma es la identidad del producto: el módulo 1 de 8 (Nuestro Producto). Son seis campos, con su guía de ejemplos bien/mal y un checklist de 0/6. Traigan la idea ya pensada a este nivel de detalle — el de los ejemplos buenos, no el de los malos. Lo que no se puede llenar con especificidad todavía no está claro, y la vara es igual para todas.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;\">\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:7px;background:#D4A017;color:#fff;font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;\">1<\u002Fspan><span><span style=\"font-weight:600;font-size:14px;color:#1E1040;\">Nombre del producto<\u002Fspan><div style=\"font-size:13px;color:#6E687C;line-height:1.55;margin-top:3px;\">Un nombre que diga qué hace, no una etiqueta. Tan claro como \"ObraScore — scoring crediticio con datos de avance de obra\", no \"Proyecto de datos\".<\u002Fdiv><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:7px;background:#D4A017;color:#fff;font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;\">2<\u002Fspan><span><span style=\"font-weight:600;font-size:14px;color:#1E1040;\">Qué hace (una línea)<\u002Fspan><div style=\"font-size:13px;color:#6E687C;line-height:1.55;margin-top:3px;\">Una frase que entienda alguien de fuera de Mango. Si necesitas un párrafo, no lo tienes claro.<\u002Fdiv><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:7px;background:#D4A017;color:#fff;font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;\">3<\u002Fspan><span><span style=\"font-weight:600;font-size:14px;color:#1E1040;\">Para quién (usuario objetivo)<\u002Fspan><div style=\"font-size:13px;color:#6E687C;line-height:1.55;margin-top:3px;\">Segmento con números, no una categoría. Tan específico como \"constructores PyME de obra residencial en CDMX y Monterrey con 2-10 proyectos activos que compran $500K-$5M mensuales en materiales\", no \"constructores\".<\u002Fdiv><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:7px;background:#D4A017;color:#fff;font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;\">4<\u002Fspan><span><span style=\"font-weight:600;font-size:14px;color:#1E1040;\">Problema que resuelve<\u002Fspan><div style=\"font-size:13px;color:#6E687C;line-height:1.55;margin-top:3px;\">El dolor concreto de ese usuario y a quién más le pega. Tan específico como \"los constructores PyME no tienen historial crediticio formal: los bancos los rechazan y los distribuidores no saben si cobrarles a 30, 60 o 90 días sin arriesgar cartera\", no \"no tienen crédito\".<\u002Fdiv><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:7px;background:#D4A017;color:#fff;font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;\">5<\u002Fspan><span><span style=\"font-weight:600;font-size:14px;color:#1E1040;\">Solución propuesta<\u002Fspan><div style=\"font-size:13px;color:#6E687C;line-height:1.55;margin-top:3px;\">El cómo, concreto. Tan específico como \"usar datos de avance de obra (fotos, bitácora, compras de material) como señal crediticia alternativa para generar un score que el distribuidor use al otorgar crédito\", no \"darles un score\".<\u002Fdiv><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:7px;background:#D4A017;color:#fff;font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;\">6<\u002Fspan><span><span style=\"font-weight:600;font-size:14px;color:#1E1040;\">Stakeholders mapeados<\u002Fspan><div style=\"font-size:13px;color:#6E687C;line-height:1.55;margin-top:3px;\">Cada actor del ecosistema con su rol. Tan específico como \"constructor (usuario), distribuidor (otorga crédito), BBVA (facility), STP (rieles de pago), SAT (validación fiscal), perito valuador (validación de obra)\", no \"clientes y proveedores\". Por cada uno se captura nombre, rol y cómo participa.<\u002Fdiv><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FEF9E7;border-radius:14px;padding:18px 22px;margin-top:18px;font-size:13.5px;color:#6a5500;line-height:1.65;\">Encima de los seis campos hay un séptimo cierre que el módulo pide igual: <b style=\"color:#1E1040;\">cómo aporta a la visión del buró<\u002Fb>. Si la idea no acumula información crediticia única del sector, le falta el norte.<\u002Fdiv>\n      <div style=\"background:#FEF9E7;border-radius:14px;padding:18px 22px;margin-top:12px;font-size:13.5px;color:#6a5500;line-height:1.65;\">Sobre la IA: úsenla para investigar, estructurar y explorar. El trabajo real —entrevistar usuarios, leer regulación, validar la hipótesis con datos— no lo reemplaza. El comité pregunta a profundidad y ahí se ve quién hizo la tarea.<\u002Fdiv>\n      <div style=\"background:#1E1040;color:#fff;border-radius:18px;padding:24px 28px;margin-top:14px;\">\n        <div style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#D4A017;font-weight:600;\">La prueba de fuego<\u002Fdiv>\n        <div style=\"font-size:16px;font-weight:600;margin-top:10px;line-height:1.5;\">Si un inversionista te pregunta \"¿qué es esto?\" en un elevador, ¿qué le dices en 15 segundos?<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#C9C4D6;margin-top:8px;line-height:1.65;\">Si no sale limpio, el producto todavía no está definido. Esa frase es la que tienen que poder decir antes de llenar nada.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 7. Por qué sí -->\n    <section style=\"padding:42px 0;border-bottom:1px solid #EFEDE8;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D4A017;font-weight:600;margin-bottom:8px;\">Por qué sí<\u002Fdiv>\n      <h2 style=\"font-size:23px;font-weight:700;color:#1E1040;letter-spacing:-0.01em;margin:0 0 8px;\">La data que respalda la idea<\u002Fh2>\n      <p style=\"font-size:15px;color:#3D3D3D;line-height:1.65;margin:0 0 18px;max-width:68ch;\">Así trabajé el ejemplo: estos son los datos de la munición que lo sostienen. Marca el nivel de profundidad que el comité espera de cualquier propuesta, no una ventaja para esta.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;\">\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:20px;\"><div style=\"font-weight:700;font-size:14px;color:#1E1040;margin-bottom:6px;\">Ya tenemos las dos puntas<\u002Fdiv><div style=\"font-size:13px;color:#6a5500;line-height:1.6;\">196 constructores + 35 distribuidores activos. Nadie más opera ambos lados de la misma transacción.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:20px;\"><div style=\"font-weight:700;font-size:14px;color:#1E1040;margin-bottom:6px;\">$297M en operaciones históricas<\u002Fdiv><div style=\"font-size:13px;color:#6a5500;line-height:1.6;\">El historial de compra y pago que alimenta el costeo y el catálogo de precios inferido.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:20px;\"><div style=\"font-weight:700;font-size:14px;color:#1E1040;margin-bottom:6px;\">Cierra un círculo abierto<\u002Fdiv><div style=\"font-size:13px;color:#6a5500;line-height:1.6;\">Proyectos ya existe; esto lo profundiza en vez de abrir un frente nuevo. Disciplina, no dispersión.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#FEF9E7;border-radius:14px;padding:20px;\"><div style=\"font-weight:700;font-size:14px;color:#1E1040;margin-bottom:6px;\">Alma de reportar a predecir<\u002Fdiv><div style=\"font-size:13px;color:#6a5500;line-height:1.6;\">El pipeline de obra antes de que exista es la señal predictiva que hoy no capturamos — justo lo que el buró necesita.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 8. Honestidad intelectual -->\n    <section style=\"padding:42px 0;border-bottom:1px solid #EFEDE8;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D4A017;font-weight:600;margin-bottom:8px;\">Honestidad intelectual<\u002Fdiv>\n      <h2 style=\"font-size:23px;font-weight:700;color:#1E1040;letter-spacing:-0.01em;margin:0 0 8px;\">Lo que la idea NO cubre todavía<\u002Fh2>\n      <p style=\"font-size:15px;color:#3D3D3D;line-height:1.65;margin:0 0 18px;max-width:68ch;\">Del ejemplo: estos son los huecos. El trabajo de los próximos días es atacarlos, no esconderlos.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;\">\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#C0392B;margin-top:6px;\"><\u002Fspan><span><div style=\"font-weight:600;font-size:14px;color:#1E1040;margin-bottom:3px;\">El takeoff desde plano<\u002Fdiv><div style=\"font-size:13px;color:#6E687C;line-height:1.55;\">Es lo más difícil y menos probado. Depende de un tercero y de la calidad de los planos que suban constructores mexicanos — rara vez CAD limpios. Mayor riesgo de ejecución.<\u002Fdiv><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#C0392B;margin-top:6px;\"><\u002Fspan><span><div style=\"font-weight:600;font-size:14px;color:#1E1040;margin-bottom:3px;\">Los catálogos de precio<\u002Fdiv><div style=\"font-size:13px;color:#6E687C;line-height:1.55;\">\"Los vemos o los conseguimos\" es el supuesto más frágil. Sin precios reales y actualizados, el forecast pierde credibilidad.<\u002Fdiv><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#C0392B;margin-top:6px;\"><\u002Fspan><span><div style=\"font-weight:600;font-size:14px;color:#1E1040;margin-bottom:3px;\">Los ERPs de distribuidores<\u002Fdiv><div style=\"font-size:13px;color:#6E687C;line-height:1.55;\">El matchmaking dirigido es visión, no MVP. La fase 1 no puede depender de esto.<\u002Fdiv><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:8px;height:8px;border-radius:2px;background:#C0392B;margin-top:6px;\"><\u002Fspan><span><div style=\"font-weight:600;font-size:14px;color:#1E1040;margin-bottom:3px;\">¿Se cobra el forecast?<\u002Fdiv><div style=\"font-size:13px;color:#6E687C;line-height:1.55;\">Si el constructor no toma financiamiento, ¿el costeo fue de pago o gancho gratis para capturar el dato? El equipo lo define.<\u002Fdiv><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 9. Las 7 preguntas -->\n    <section style=\"padding:42px 0;border-bottom:1px solid #EFEDE8;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D4A017;font-weight:600;margin-bottom:8px;\">El estándar del comité<\u002Fdiv>\n      <h2 style=\"font-size:23px;font-weight:700;color:#1E1040;letter-spacing:-0.01em;margin:0 0 16px;\">Las 7 preguntas que deciden si un producto gana<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;\">\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:50%;background:#1E1040;color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;\">1<\u002Fspan><span style=\"font-size:14px;color:#1E1040;line-height:1.5;\">Genera datos nuevos que Mango no captura hoy<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:50%;background:#1E1040;color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;\">2<\u002Fspan><span style=\"font-size:14px;color:#1E1040;line-height:1.5;\">Los datos son verificables por contrapartes con interés contrario (triangulación)<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:50%;background:#1E1040;color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;\">3<\u002Fspan><span style=\"font-size:14px;color:#1E1040;line-height:1.5;\">Fortalece la capacidad de evaluar riesgo de constructores y distribuidores<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:50%;background:#1E1040;color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;\">4<\u002Fspan><span style=\"font-size:14px;color:#1E1040;line-height:1.5;\">Se integra con la plataforma actual (pagos, crédito, STP, proveedores)<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:50%;background:#1E1040;color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;\">5<\u002Fspan><span style=\"font-size:14px;color:#1E1040;line-height:1.5;\">Tiene un modelo de negocio viable que escala con la red<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:50%;background:#1E1040;color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;\">6<\u002Fspan><span style=\"font-size:14px;color:#1E1040;line-height:1.5;\">Construye defensibilidad: mientras más se usa, más difícil de replicar<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #EFEDE8;\"><span style=\"flex:none;width:26px;height:26px;border-radius:50%;background:#D4A017;color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;\">7<\u002Fspan><span style=\"font-size:14px;color:#1E1040;line-height:1.5;\">Aporta a la visión del buró: acumula información crediticia única del sector<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 10. Por qué este equipo (CON FOTOS) -->\n    <section style=\"padding:42px 0;border-bottom:1px solid #EFEDE8;\">\n      <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D4A017;font-weight:600;margin-bottom:8px;\">Por qué este equipo<\u002Fdiv>\n      <h2 style=\"font-size:23px;font-weight:700;color:#1E1040;letter-spacing:-0.01em;margin:0 0 8px;\">Cubrimos el ciclo completo de evaluación<\u002Fh2>\n      <p style=\"font-size:15px;color:#3D3D3D;line-height:1.65;margin:0 0 20px;max-width:68ch;\">No estamos armados al azar. Cada quien dueña una de las dimensiones que el comité evalúa: necesidad y potencial de mercado, estrategia de desarrollo y conectividad, y cómo lo comercializamos. La diversidad es la fortaleza.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px;\">\n\n        <div style=\"border:1px solid #E5E2DA;border-radius:14px;padding:20px;background:#fff;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n            <image-slot id=\"photo-nea\" shape=\"{{ photoShape }}\" radius=\"16\" style=\"width:88px;height:88px;flex:none;\" placeholder=\"Foto\"><\u002Fimage-slot>\n            <div><div style=\"font-weight:700;font-size:15px;color:#1E1040;\">Nea Sivolli<\u002Fdiv><div style=\"font-size:12px;color:#A9A28D;margin-top:2px;\">Chief of Staff<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;color:#1E1040;font-weight:600;margin-bottom:3px;\">Dueña/o de: Orquestación, modelo de negocio y conexión con la tesis<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#6E687C;line-height:1.5;\">Cómo monetiza y cómo encaja en el ecosistema<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #E5E2DA;border-radius:14px;padding:20px;background:#fff;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n            <image-slot id=\"photo-tatiana\" shape=\"{{ photoShape }}\" radius=\"16\" style=\"width:88px;height:88px;flex:none;\" placeholder=\"Foto\" data-comment-anchor=\"487b54245d-image-slot\"><\u002Fimage-slot>\n            <div><div style=\"font-weight:700;font-size:15px;color:#1E1040;\">Tatiana Guerrero<\u002Fdiv><div style=\"font-size:12px;color:#A9A28D;margin-top:2px;\">Data/BI Engineer<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;color:#1E1040;font-weight:600;margin-bottom:3px;\">Dueña/o de: Evaluación de la señal<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#6E687C;line-height:1.5;\">¿El dato es nuevo, triangulable y predictivo?<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #E5E2DA;border-radius:14px;padding:20px;background:#fff;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n            <image-slot id=\"photo-mati\" shape=\"{{ photoShape }}\" radius=\"16\" style=\"width:88px;height:88px;flex:none;\" placeholder=\"Foto\"><\u002Fimage-slot>\n            <div><div style=\"font-weight:700;font-size:15px;color:#1E1040;\">Mati Ríos<\u002Fdiv><div style=\"font-size:12px;color:#A9A28D;margin-top:2px;\">Tech Lead<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;color:#1E1040;font-weight:600;margin-bottom:3px;\">Dueña/o de: Factibilidad técnica y conectividad<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#6E687C;line-height:1.5;\">¿Se construye? ¿Se integra con la plataforma actual?<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #E5E2DA;border-radius:14px;padding:20px;background:#fff;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n            <image-slot id=\"photo-david\" shape=\"{{ photoShape }}\" radius=\"16\" style=\"width:88px;height:88px;flex:none;\" placeholder=\"Foto\"><\u002Fimage-slot>\n            <div><div style=\"font-weight:700;font-size:15px;color:#1E1040;\">David Nava<\u002Fdiv><div style=\"font-size:12px;color:#A9A28D;margin-top:2px;\">Key Account / Inteligencia comercial<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;color:#1E1040;font-weight:600;margin-bottom:3px;\">Dueña/o de: Potencial de mercado y monetización<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#6E687C;line-height:1.5;\">¿Lo quieren las cuentas grandes? ¿Cuánto pagan?<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border:1px solid #E5E2DA;border-radius:14px;padding:20px;background:#fff;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n            <image-slot id=\"photo-edgardo\" shape=\"{{ photoShape }}\" radius=\"16\" style=\"width:88px;height:88px;flex:none;\" placeholder=\"Foto\"><\u002Fimage-slot>\n            <div><div style=\"font-weight:700;font-size:15px;color:#1E1040;\">Ed
